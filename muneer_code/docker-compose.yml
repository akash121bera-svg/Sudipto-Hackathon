version: '3.8'

services:
  # 1. Transactional Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: doc_intelligence_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doc_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Semantic Memory Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc_intelligence_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Reasoning LLM Instance (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: doc_intelligence_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # 4. Multi-Agent Backend Orchestrator (FastAPI + LangGraph)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_intelligence_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=doc_intelligence
      - QDRANT_HOST=qdrant
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_MOCK_FALLBACK=True  # Toggle this to False if GPU/local engines are fully loaded
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  backend_storage:
